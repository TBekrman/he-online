<input type="hidden" name="ID">
<input type="hidden" name="DATA_CADASTRO">
<div class="row g-3">
  <div class="col-md-8"><label class="form-label">Nome</label><input class="form-control" name="NOME" required></div>
  <div class="col-md-4"><label class="form-label">Data de nascimento</label><input type="date" class="form-control" name="DATA_NASCIMENTO" required></div>
  <div class="col-md-4"><label class="form-label">Naturalidade</label><input class="form-control" name="NATURALIDADE"></div>
  <div class="col-md-2"><label class="form-label">UF</label><input class="form-control" name="UF" maxlength="2"></div>
  <div class="col-md-3"><label class="form-label">Nacionalidade</label><input class="form-control" name="NACIONALIDADE" value="Brasileira"></div>
  <div class="col-md-3"><label class="form-label">Sexo</label><select class="form-select" name="SEXO"><option></option><option>Feminino</option><option>Masculino</option><option>Nao informado</option></select></div>
  <div class="col-md-6"><label class="form-label">Mae</label><input class="form-control" name="MAE" required></div>
  <div class="col-md-6"><label class="form-label">Pai</label><input class="form-control" name="PAI"></div>
  <div class="col-md-3"><label class="form-label">RG</label><input class="form-control" name="RG"></div>
  <div class="col-md-3"><label class="form-label">Orgao expedidor</label><input class="form-control" name="ORGAO_EXPEDIDOR"></div>
  <div class="col-md-2"><label class="form-label">UF RG</label><input class="form-control" name="UF_RG" maxlength="2"></div>
  <div class="col-md-4"><label class="form-label">CPF</label><input class="form-control" name="CPF"></div>
  <div class="col-md-6"><label class="form-label">Endereco</label><input class="form-control" name="ENDERECO"></div>
  <div class="col-md-3"><label class="form-label">Telefone</label><input class="form-control" name="TELEFONE"></div>
  <div class="col-md-3"><label class="form-label">Email</label><input type="email" class="form-control" name="EMAIL"></div>
  <div class="col-12"><label class="form-label">Observacoes</label><textarea class="form-control" name="OBSERVACOES" rows="3"></textarea></div>
</div>
