<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👥 Gerenciar Alunos - HE Online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #007bff;
            --secondary: #6c757d;
            --success: #28a745;
            --danger: #dc3545;
        }
        
        body {
            background-color: #f8f9fa;
            padding: 20px;
        }
        
        .form-section {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        
        .form-section h2 {
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 15px;
        }
        
        .students-table {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .search-box {
            margin-bottom: 20px;
        }
        
        .table thead {
            background-color: var(--primary);
            color: white;
        }
        
        .table tbody tr:hover {
            background-color: #f0f0f0;
        }
        
        .btn-action {
            padding: 5px 10px;
            font-size: 0.85rem;
            margin: 2px;
        }
        
        .form-label {
            font-weight: 600;
            color: #333;
            margin-top: 10px;
            margin-bottom: 8px;
        }
        
        .btn-submit {
            padding: 10px 30px;
            font-weight: 600;
            border-radius: 8px;
            margin-right: 10px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .alert-message {
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <!-- Alerts -->
        <div id="alertSuccess" class="alert alert-success alert-message" role="alert">
            <i class="bi bi-check-circle"></i> <span id="successMessage"></span>
        </div>
        <div id="alertError" class="alert alert-danger alert-message" role="alert">
            <i class="bi bi-exclamation-circle"></i> <span id="errorMessage"></span>
        </div>
        
        <!-- Formulário -->
        <div class="form-section">
            <h2>➕ Cadastro de Alunos</h2>
            
            <form id="studentForm">
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Nome *</label>
                            <input type="text" class="form-control" id="nome" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Data de Nascimento *</label>
                            <input type="date" class="form-control" id="dataNascimento" required>
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label class="form-label">CPF</label>
                            <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label class="form-label">RG</label>
                            <input type="text" class="form-control" id="rg">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label class="form-label">Órgão Expedidor</label>
                            <input type="text" class="form-control" id="orgaoExpedidor">
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Naturalidade</label>
                            <input type="text" class="form-control" id="naturalidade">
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="mb-3">
                            <label class="form-label">UF</label>
                            <input type="text" class="form-control" id="uf" maxlength="2">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label class="form-label">Nacionalidade</label>
                            <input type="text" class="form-control" id="nacionalidade" value="Brasileira">
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label class="form-label">Sexo</label>
                            <select class="form-control" id="sexo">
                                <option value="">Selecione...</option>
                                <option value="Masculino">Masculino</option>
                                <option value="Feminino">Feminino</option>
                                <option value="Outro">Outro</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label class="form-label">Telefone</label>
                            <input type="tel" class="form-control" id="telefone" placeholder="(00) 00000-0000">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="email">
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Mãe</label>
                            <input type="text" class="form-control" id="mae">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Pai</label>
                            <input type="text" class="form-control" id="pai">
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-12">
                        <div class="mb-3">
                            <label class="form-label">Endereço</label>
                            <input type="text" class="form-control" id="endereco">
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-12">
                        <div class="mb-3">
                            <label class="form-label">Observações</label>
                            <textarea class="form-control" id="observacoes" rows="3"></textarea>
                        </div>
                    </div>
                </div>
                
                <div>
                    <button type="submit" class="btn btn-primary btn-submit">
                        <i class="bi bi-save"></i> Salvar
                    </button>
                    <button type="reset" class="btn btn-secondary btn-submit">
                        <i class="bi bi-arrow-clockwise"></i> Limpar
                    </button>
                </div>
            </form>
        </div>
        
        <!-- Lista de Alunos -->
        <div class="students-table">
            <h2>📋 Alunos Cadastrados</h2>
            
            <div class="search-box">
                <input type="text" class="form-control" id="searchInput" placeholder="🔍 Pesquisar por nome, CPF ou email...">
            </div>
            
            <div id="loading" class="loading">
                <div class="loading-spinner"></div>
                <p>Carregando alunos...</p>
            </div>
            
            <div class="table-responsive" id="studentsTableContainer" style="display: none;">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>CPF</th>
                            <th>Email</th>
                            <th>Telefone</th>
                            <th>Data Cadastro</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="studentsTableBody">
                    </tbody>
                </table>
            </div>
            
            <div id="emptyMessage" class="alert alert-info">
                Nenhum aluno cadastrado
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let allStudents = [];
        
        // Carrega alunos ao inicializar
        function loadStudents() {
            document.getElementById('loading').style.display = 'block';
            google.script.run.withSuccessHandler(displayStudents).listStudents();
        }
        
        // Exibe alunos na tabela
        function displayStudents(students) {
            allStudents = students;
            const tbody = document.getElementById('studentsTableBody');
            const container = document.getElementById('studentsTableContainer');
            const emptyMsg = document.getElementById('emptyMessage');
            
            document.getElementById('loading').style.display = 'none';
            
            if (!students || students.length === 0) {
                container.style.display = 'none';
                emptyMsg.style.display = 'block';
                return;
            }
            
            tbody.innerHTML = students.map(student => `
                <tr>
                    <td><strong>${escapeHtml(student.ID)}</strong></td>
                    <td>${escapeHtml(student.NOME)}</td>
                    <td>${student.CPF || '-'}</td>
                    <td>${escapeHtml(student.EMAIL)}</td>
                    <td>${student.TELEFONE || '-'}</td>
                    <td>${student.DATA_CADASTRO || '-'}</td>
                    <td>
                        <button class="btn btn-sm btn-info btn-action" onclick="editStudent('${escapeHtml(student.ID)}')">
                            <i class="bi bi-pencil"></i> Editar
                        </button>
                        <button class="btn btn-sm btn-danger btn-action" onclick="deleteStudent('${escapeHtml(student.ID)}', '${escapeHtml(student.NOME)}')">
                            <i class="bi bi-trash"></i> Excluir
                        </button>
                    </td>
                </tr>
            `).join('');
            
            container.style.display = 'block';
            emptyMsg.style.display = 'none';
        }
        
        // Pesquisa alunos
        document.getElementById('searchInput')?.addEventListener('keyup', function(e) {
            const query = e.target.value.toLowerCase();
            
            if (!query) {
                displayStudents(allStudents);
                return;
            }
            
            google.script.run.withSuccessHandler(displayStudents).searchStudents(query);
        });
        
        // Salva aluno
        document.getElementById('studentForm')?.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const studentData = {
                nome: document.getElementById('nome').value,
                dataNascimento: document.getElementById('dataNascimento').value,
                cpf: document.getElementById('cpf').value,
                rg: document.getElementById('rg').value,
                orgaoExpedidor: document.getElementById('orgaoExpedidor').value,
                naturalidade: document.getElementById('naturalidade').value,
                uf: document.getElementById('uf').value,
                nacionalidade: document.getElementById('nacionalidade').value,
                sexo: document.getElementById('sexo').value,
                telefone: document.getElementById('telefone').value,
                email: document.getElementById('email').value,
                mae: document.getElementById('mae').value,
                pai: document.getElementById('pai').value,
                endereco: document.getElementById('endereco').value,
                observacoes: document.getElementById('observacoes').value
            };
            
            google.script.run.withSuccessHandler(function(result) {
                showSuccess('Aluno salvo com sucesso!');
                document.getElementById('studentForm').reset();
                loadStudents();
            }).withFailureHandler(function(error) {
                showError(error.toString());
            }).addStudent(studentData);
        });
        
        // Edita aluno
        function editStudent(studentId) {
            alert('Edição será implementada em breve. ID: ' + studentId);
        }
        
        // Deleta aluno
        function deleteStudent(studentId, studentName) {
            if (confirm(`Deseja realmente excluir o aluno "${studentName}"?`)) {
                google.script.run.withSuccessHandler(function() {
                    showSuccess('Aluno excluído com sucesso!');
                    loadStudents();
                }).withFailureHandler(function(error) {
                    showError(error.toString());
                }).deleteStudent(studentId);
            }
        }
        
        // Utilitários
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showSuccess(message) {
            document.getElementById('successMessage').textContent = message;
            document.getElementById('alertSuccess').style.display = 'block';
            setTimeout(() => {
                document.getElementById('alertSuccess').style.display = 'none';
            }, 5000);
        }
        
        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('alertError').style.display = 'block';
            setTimeout(() => {
                document.getElementById('alertError').style.display = 'none';
            }, 5000);
        }
        
        // Funções expostas
        function addStudent(studentData) {
            return StudentsController.addStudent(studentData);
        }
        
        function listStudents() {
            return StudentsController.listStudents();
        }
        
        function searchStudents(query) {
            return StudentsController.searchStudents(query);
        }
        
        function deleteStudent(studentId) {
            return StudentsController.deleteStudent(studentId);
        }
        
        // Carrega ao inicializar
        loadStudents();
    </script>
</body>
</html>
